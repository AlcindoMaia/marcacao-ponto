<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Maia Solutions — Marcação de Ponto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   TOKENS
============================================================ */
:root {
  --gold:       #f4b942;
  --gold-dk:    #d29d36;
  --gold-glow:  rgba(244,185,66,.3);
  --bg:         #111;
  --bg2:        #1a1a1a;
  --bg3:        #222;
  --border:     rgba(255,255,255,.07);
  --text:       #f0f0f0;
  --muted:      rgba(255,255,255,.4);
  --green:      #4caf7d;
  --green-bg:   rgba(76,175,125,.12);
  --red:        #e05c5c;
  --red-bg:     rgba(224,92,92,.1);
  --radius:     18px;
  --radius-sm:  12px;
  --font-h:     'Oswald', sans-serif;
  --font-b:     'Inter', sans-serif;
  --safe-b:     env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  overflow-x: hidden;
}

/* ============================================================
   LOADING
============================================================ */
.ecrã-loading {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  background: var(--bg);
}

.loading-logo {
  height: 64px;
  width: auto;
  animation: pulse 1.8s ease-in-out infinite;
}

.loading-txt {
  font-family: var(--font-h);
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
}

@keyframes pulse {
  0%, 100% { opacity: .3; transform: scale(.97); }
  50%       { opacity: .8; transform: scale(1); }
}

/* ============================================================
   BLOQUEIO
============================================================ */
.ecrã-bloqueio {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  text-align: center;
  gap: 14px;
  background: var(--bg);
}

.bloqueio-icon { font-size: 56px; margin-bottom: 4px; }

.bloqueio-titulo {
  font-family: var(--font-h);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: .8px;
  color: var(--text);
}

.bloqueio-msg {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.7;
  max-width: 280px;
}

/* ============================================================
   ECRÃ PRINCIPAL
============================================================ */
.screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding-bottom: calc(28px + var(--safe-b));
}

/* ── Header ── */
.header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo { height: 44px; width: auto; }

.header-obra {
  text-align: right;
  font-family: var(--font-h);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1.4;
}

.header-obra span {
  display: block;
  font-size: 13px;
  color: var(--gold);
  font-weight: 500;
}

/* ── Hero ── */
.hero {
  padding: 24px 20px 0;
}

.hero-greeting {
  font-family: var(--font-h);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.hero-name {
  font-family: var(--font-h);
  font-size: 28px;
  font-weight: 500;
  letter-spacing: .5px;
  line-height: 1.1;
}

/* ── Barra de estado ── */
.estado-bar {
  margin: 16px 20px 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.estado-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.estado-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background .3s, box-shadow .3s;
}

.estado-dot.entrada {
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(76,175,125,.2), 0 0 8px rgba(76,175,125,.4);
  animation: ping 2s ease infinite;
}

.estado-dot.saida {
  background: var(--red);
  box-shadow: 0 0 6px rgba(224,92,92,.4);
}

@keyframes ping {
  0%, 100% { box-shadow: 0 0 0 3px rgba(76,175,125,.2), 0 0 8px rgba(76,175,125,.4); }
  50%       { box-shadow: 0 0 0 6px rgba(76,175,125,.05), 0 0 12px rgba(76,175,125,.5); }
}

.estado-label {
  font-family: var(--font-h);
  font-size: 13px;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--text);
}

.estado-hora {
  font-family: var(--font-h);
  font-size: 13px;
  color: var(--muted);
}

/* ── Botão principal ── */
.btn-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px 24px;
  gap: 16px;
}

.btn-marcacao {
  width: 188px;
  height: 188px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  background: radial-gradient(circle at 38% 32%, #ffe08a, var(--gold) 45%, var(--gold-dk));
  box-shadow:
    0 0 0 14px rgba(244,185,66,.07),
    0 0 0 28px rgba(244,185,66,.03),
    0 24px 64px rgba(244,185,66,.22),
    0 8px 24px rgba(0,0,0,.5);
}

.btn-marcacao:active {
  transform: scale(.94);
  box-shadow:
    0 0 0 6px rgba(244,185,66,.1),
    0 8px 24px rgba(244,185,66,.15),
    0 4px 12px rgba(0,0,0,.4);
}

.btn-marcacao.disabled {
  background: var(--bg3);
  box-shadow: none;
  cursor: default;
  opacity: .5;
  transform: none;
}

.btn-icon {
  font-size: 48px;
  line-height: 1;
  position: relative;
  z-index: 1;
}

.btn-label {
  font-family: var(--font-h);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #1a1000;
  position: relative;
  z-index: 1;
}

.btn-sublabel {
  font-size: 10px;
  color: rgba(0,0,0,.45);
  letter-spacing: .5px;
  margin-top: -4px;
  position: relative;
  z-index: 1;
}

/* Hora actual abaixo do botão */
.hora-actual {
  font-family: var(--font-h);
  font-size: 32px;
  font-weight: 300;
  letter-spacing: 3px;
  color: var(--text);
  opacity: .7;
}

/* ── Feedback ── */
.feedback {
  margin: 0 20px;
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-family: var(--font-h);
  font-size: 13px;
  letter-spacing: .5px;
  text-align: center;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity .3s;
}

.feedback:empty { opacity: 0; }
.feedback.ok   { background: var(--green-bg); color: var(--green); border: 1px solid rgba(76,175,125,.2); }
.feedback.erro { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(224,92,92,.2); }
.feedback.info { background: rgba(244,185,66,.08); color: var(--gold); border: 1px solid rgba(244,185,66,.2); }

/* ── Histórico ── */
.historico {
  margin: 20px 20px 0;
}

.historico-titulo {
  font-family: var(--font-h);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-left: 2px;
}

.hist-lista {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.hist-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background .15s;
}

.hist-item:active { background: var(--bg3); }

.hist-tipo {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.hist-tipo.entrada { background: var(--green); }
.hist-tipo.saida   { background: var(--red); }

.hist-texto {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}

.hist-data {
  font-size: 11px;
  color: var(--muted);
}

.hist-hora {
  font-family: var(--font-h);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: .3px;
}
</style>
</head>
<body>

<!-- ECRÃ DE LOADING INICIAL -->
<div id="ecrãLoading" class="ecrã-loading">
  <img src="Logo.png" class="loading-logo" alt="Maia Solutions">
  <div class="loading-txt">A verificar dispositivo…</div>
</div>

<!-- ECRÃ DE BLOQUEIO -->
<div id="ecrãBloqueio" class="ecrã-bloqueio" style="display:none">
  <div class="bloqueio-icon">🔒</div>
  <div class="bloqueio-titulo" id="bloqueioTitulo">Dispositivo não autorizado</div>
  <div class="bloqueio-msg" id="bloqueioMsg">
    Este dispositivo não está registado no sistema.<br>Contacte o administrador.
  </div>
</div>

<!-- ECRÃ PRINCIPAL -->
<div id="ecrãPrincipal" class="screen" style="display:none">

  <!-- Header -->
  <div class="header">
    <img src="Logo.png" class="logo" alt="Maia Solutions">
    <div class="header-obra">
      Obra
      <span id="obraNome">—</span>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-greeting">Olá,</div>
    <div class="hero-name" id="funcNome">—</div>
  </div>

  <!-- Estado actual -->
  <div class="estado-bar">
    <div class="estado-info">
      <div class="estado-dot" id="estadoDot"></div>
      <div class="estado-label" id="estadoLabel">Sem registos hoje</div>
    </div>
    <div class="estado-hora" id="estadoHora"></div>
  </div>

  <!-- Botão principal -->
  <div class="btn-wrap">
    <button class="btn-marcacao" id="btnMarcacao">
      <div class="btn-icon" id="btnIcon">▶</div>
      <div class="btn-label" id="btnLabel">Entrada</div>
      <div class="btn-sublabel" id="btnSublabel">Toca para registar</div>
    </button>
    <div class="hora-actual" id="horaActual">--:--</div>
  </div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <!-- Histórico semanal -->
  <div class="historico">
    <div class="historico-titulo">Esta semana</div>
    <div class="hist-lista" id="histLista">
      <div style="padding:10px 0;font-size:13px;color:var(--text-muted);text-align:center">A carregar…</div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
