<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Maia Solutions — Marcação de Ponto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   RESET & BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:        #f4b942;
  --gold-dk:     #d29d36;
  --gold-lt:     #fde89a;
  --bg:          #141414;
  --bg2:         #1e1e1e;
  --bg3:         #272727;
  --border:      rgba(255,255,255,.08);
  --text:        #f0f0f0;
  --text-muted:  rgba(255,255,255,.45);
  --green:       #4caf7d;
  --red:         #e05c5c;
  --radius:      16px;
  --radius-sm:   10px;
  --font-title:  'Oswald', sans-serif;
  --font-body:   'Inter', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ============================================================
   LAYOUT PRINCIPAL
============================================================ */
.screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 0 calc(20px + var(--safe-bottom));
}

/* ============================================================
   HEADER
============================================================ */
.header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.logo {
  height: 48px;
  width: auto;
}

.header-obra {
  font-family: var(--font-title);
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: right;
  max-width: 160px;
  line-height: 1.3;
}

.header-obra span {
  display: block;
  color: var(--gold);
  font-size: 14px;
  font-weight: 500;
}

/* ============================================================
   HERO — nome + estado
============================================================ */
.hero {
  padding: 28px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.hero-greeting {
  font-family: var(--font-title);
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.hero-name {
  font-family: var(--font-title);
  font-size: 30px;
  font-weight: 500;
  letter-spacing: 1px;
  line-height: 1.1;
  color: var(--text);
}

/* ============================================================
   ESTADO ACTUAL — entrada/saída
============================================================ */
.estado-bar {
  margin: 0 20px 20px;
  background: var(--bg2);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border: 1px solid var(--border);
}

.estado-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.estado-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}

.estado-dot.entrada { background: var(--green); box-shadow: 0 0 8px rgba(76,175,125,.5); }
.estado-dot.saida   { background: var(--red);   box-shadow: 0 0 8px rgba(224,92,92,.4); }

.estado-label {
  font-family: var(--font-title);
  font-size: 13px;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.estado-hora {
  font-family: var(--font-title);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}

/* ============================================================
   BOTÃO PRINCIPAL DE MARCAÇÃO
============================================================ */
.btn-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
}

.btn-marcacao {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  transition: transform .15s, box-shadow .15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: radial-gradient(circle at 40% 35%, var(--gold-lt), var(--gold) 50%, var(--gold-dk));
  box-shadow:
    0 0 0 12px rgba(244,185,66,.08),
    0 0 0 24px rgba(244,185,66,.04),
    0 20px 60px rgba(244,185,66,.25),
    0 4px 20px rgba(0,0,0,.4);
}

.btn-marcacao:active {
  transform: scale(.95);
  box-shadow:
    0 0 0 6px rgba(244,185,66,.1),
    0 10px 30px rgba(244,185,66,.2),
    0 2px 10px rgba(0,0,0,.4);
}

.btn-marcacao.disabled {
  background: var(--bg3);
  box-shadow: none;
  cursor: not-allowed;
  opacity: .5;
}

.btn-icon {
  font-size: 44px;
  line-height: 1;
}

.btn-label {
  font-family: var(--font-title);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #1a1100;
}

.btn-sublabel {
  font-family: var(--font-body);
  font-size: 11px;
  color: rgba(0,0,0,.5);
  letter-spacing: .5px;
  margin-top: -6px;
}

/* Anel de loading */
.btn-marcacao.loading .btn-icon::after {
  content: '';
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 3px solid rgba(0,0,0,.2);
  border-top-color: rgba(0,0,0,.7);
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   MENSAGEM DE FEEDBACK
============================================================ */
.feedback {
  margin: 12px 20px 0;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: .5px;
  text-align: center;
  min-height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity .3s;
}

.feedback:empty { opacity: 0; }
.feedback.ok    { background: rgba(76,175,125,.12); color: var(--green); border: 1px solid rgba(76,175,125,.2); }
.feedback.erro  { background: rgba(224,92,92,.1);   color: var(--red);   border: 1px solid rgba(224,92,92,.2); }
.feedback.info  { background: rgba(244,185,66,.1);  color: var(--gold);  border: 1px solid rgba(244,185,66,.2); }

/* ============================================================
   HISTÓRICO SEMANAL
============================================================ */
.historico {
  margin: 20px 20px 0;
}

.historico-titulo {
  font-family: var(--font-title);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.hist-lista {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.hist-item {
  background: var(--bg2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
}

.hist-tipo {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.hist-tipo.entrada { background: var(--green); }
.hist-tipo.saida   { background: var(--red); }

.hist-texto {
  flex: 1;
  font-size: 13px;
  color: var(--text);
}

.hist-hora {
  font-family: var(--font-title);
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: .3px;
}

/* ============================================================
   ECRÃ DE BLOQUEIO (dispositivo não registado)
============================================================ */
.ecrã-bloqueio {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  text-align: center;
  gap: 16px;
}

.bloqueio-icon {
  font-size: 64px;
  margin-bottom: 8px;
}

.bloqueio-titulo {
  font-family: var(--font-title);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: 1px;
  color: var(--text);
}

.bloqueio-msg {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
  max-width: 280px;
}

/* ============================================================
   ECRÃ DE LOADING INICIAL
============================================================ */
.ecrã-loading {
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}

.loading-logo {
  height: 70px;
  opacity: .6;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: .4; }
  50%       { opacity: .8; }
}

.loading-txt {
  font-family: var(--font-title);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
}
</style>
</head>
<body>

<!-- ECRÃ DE LOADING INICIAL -->
<div id="ecrãLoading" class="ecrã-loading">
  <img src="Logo.png" class="loading-logo" alt="Maia Solutions">
  <div class="loading-txt">A verificar dispositivo…</div>
</div>

<!-- ECRÃ DE BLOQUEIO -->
<div id="ecrãBloqueio" class="ecrã-bloqueio" style="display:none">
  <div class="bloqueio-icon">🔒</div>
  <div class="bloqueio-titulo" id="bloqueioTitulo">Dispositivo não autorizado</div>
  <div class="bloqueio-msg" id="bloqueioMsg">
    Este dispositivo não está registado no sistema.<br>Contacte o administrador.
  </div>
</div>

<!-- ECRÃ PRINCIPAL -->
<div id="ecrãPrincipal" class="screen" style="display:none">

  <!-- Header -->
  <div class="header">
    <img src="Logo.png" class="logo" alt="Maia Solutions">
    <div class="header-obra">
      Obra
      <span id="obraNome">—</span>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-greeting">Olá,</div>
    <div class="hero-name" id="funcNome">—</div>
  </div>

  <!-- Estado actual -->
  <div class="estado-bar">
    <div class="estado-info">
      <div class="estado-dot" id="estadoDot"></div>
      <div class="estado-label" id="estadoLabel">Sem registos hoje</div>
    </div>
    <div class="estado-hora" id="estadoHora"></div>
  </div>

  <!-- Botão principal -->
  <div class="btn-wrap">
    <button class="btn-marcacao" id="btnMarcacao">
      <div class="btn-icon" id="btnIcon">⏱</div>
      <div class="btn-label" id="btnLabel">Marcar</div>
      <div class="btn-sublabel" id="btnSublabel">Toca para registar</div>
    </button>
  </div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <!-- Histórico semanal -->
  <div class="historico">
    <div class="historico-titulo">Esta semana</div>
    <div class="hist-lista" id="histLista">
      <div style="padding:10px 0;font-size:13px;color:var(--text-muted);text-align:center">A carregar…</div>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
