<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Carga — Maia Solutions</title>
<style>
  :root {
    --primary:    #f4b942;
    --bg:         #0f0f0f;
    --surface:    #1a1a1a;
    --surface2:   #242424;
    --border:     rgba(255,255,255,.08);
    --text:       #f0f0f0;
    --text-muted: #888;
    --ok:         #5ad65a;
    --err:        #ff7a7a;
    --radius:     14px;
    --font:       'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; }

  /* ── Ecrãs base ── */
  .ecrã { display: none; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 24px; text-align: center; gap: 16px; }

  /* Loading */
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Bloqueio */
  .bloqueio-icon { font-size: 48px; }
  #bloqueioTitulo { font-size: 20px; font-weight: 700; }
  #bloqueioMsg { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  /* ── Ecrã Contexto ── */
  #ecrãContexto {
    display: none; flex-direction: column;
    min-height: 100dvh; padding: 0;
  }
  .ctx-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 20px; text-align: center;
  }
  .ctx-header .logo { font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--primary); margin-bottom: 4px; }
  .ctx-header h1 { font-size: 18px; font-weight: 700; }
  .ctx-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  .ctx-body { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }

  .campo-label { font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }

  .select-wrap { position: relative; }
  .select-wrap::after { content: "▾"; position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  select { width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; color: var(--text); font-size: 15px;
    font-family: var(--font); outline: none; appearance: none; -webkit-appearance: none; }
  select:focus { border-color: var(--primary); }

  .seta-ctx { text-align: center; font-size: 28px; color: var(--primary); }

  .btn-primary { width: 100%; padding: 16px; border: none; border-radius: var(--radius);
    background: var(--primary); color: #000; font-size: 16px; font-weight: 800;
    cursor: pointer; transition: opacity .15s; }
  .btn-primary:disabled { opacity: .4; cursor: default; }
  .btn-secondary { padding: 12px 20px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--surface2); color: var(--text);
    font-size: 14px; font-weight: 600; cursor: pointer; }

  /* ── Ecrã Sessão ── */
  #ecrãSessao { display: none; flex-direction: column; min-height: 100dvh; }

  .sess-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .sess-rota { flex: 1; font-size: 13px; font-weight: 700; }
  .sess-rota span { color: var(--primary); }
  .btn-terminar { padding: 8px 14px; background: rgba(255,122,122,.15); border: 1px solid rgba(255,122,122,.3);
    color: var(--err); border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }

  /* Leitor QR */
  .qr-area {
    background: #000; position: relative; flex-shrink: 0;
    height: 200px; overflow: hidden;
  }
  #qrVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
  .qr-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .qr-frame {
    width: 140px; height: 140px; border: 2px solid var(--primary);
    border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,.5);
  }
  #qrCanvas { display: none; }
  .qr-status {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.7); color: #fff; font-size: 12px;
    padding: 6px; text-align: center;
  }

  /* Input manual */
  .manual-area {
    padding: 10px 16px; display: flex; gap: 8px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .manual-area input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px;
    font-family: var(--font); outline: none;
  }
  .manual-area input:focus { border-color: var(--primary); }
  .manual-area button { padding: 10px 16px; background: var(--primary); border: none;
    border-radius: 8px; color: #000; font-weight: 700; font-size: 13px; cursor: pointer; }

  /* Lista de itens */
  .lista-header {
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .lista-header span { font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted); }
  .lista-header strong { font-size: 13px; color: var(--primary); }

  .lista-itens { flex: 1; overflow-y: auto; }
  .item-carga {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .item-tipo { font-size: 18px; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-nome { font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-codigo { font-size: 11px; color: var(--text-muted); font-family: monospace; }
  .item-qtd { font-size: 16px; font-weight: 800; color: var(--primary); flex-shrink: 0; }
  .item-remover { background: none; border: none; color: var(--err);
    font-size: 18px; cursor: pointer; opacity: .6; flex-shrink: 0; padding: 4px; }

  .lista-vazia { padding: 40px 20px; text-align: center; color: var(--text-muted);
    font-size: 14px; line-height: 1.6; }

  /* ── Modal artigo detectado ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 24px 20px 36px; width: 100%; max-width: 480px;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-artigo-codigo { display: inline-block; background: var(--primary); color: #000;
    font-weight: 800; font-size: 12px; letter-spacing: 1px; padding: 4px 10px;
    border-radius: 6px; margin-bottom: 8px; }
  .modal-artigo-nome { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .modal-artigo-tipo { font-size: 12px; color: var(--text-muted); margin-bottom: 20px;
    text-transform: uppercase; letter-spacing: .5px; }

  .aviso-repetido { background: rgba(244,185,66,.12); border: 1px solid rgba(244,185,66,.3);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 13px;
    color: var(--primary); font-weight: 600; }

  .qtd-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .btn-qtd { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 22px; font-weight: 300;
    cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #modalQtdInput { flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; color: var(--text); font-size: 24px; font-weight: 700;
    text-align: center; font-family: var(--font); outline: none; }
  #modalQtdInput:focus { border-color: var(--primary); }

  .modal-acoes { display: flex; flex-direction: column; gap: 10px; }
  .modal-acoes .btn-primary { padding: 14px; }
  .btn-cancelar { width: 100%; padding: 12px; border: none; background: none;
    color: var(--text-muted); font-size: 14px; cursor: pointer; }

  /* ── Ecrã Resumo ── */
  #ecrãResumo { display: none; flex-direction: column; min-height: 100dvh; }
  .resumo-header { background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 20px; text-align: center; }
  .resumo-header h2 { font-size: 18px; font-weight: 700; }
  .resumo-rota { font-size: 14px; color: var(--primary); margin-top: 4px; }
  .resumo-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .resumo-lista { flex: 1; overflow-y: auto; padding: 8px 0; }
  .resumo-item { padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; }
  .resumo-item-info .nome { font-size: 14px; font-weight: 600; }
  .resumo-item-info .codigo { font-size: 11px; color: var(--text-muted); font-family: monospace; }
  .resumo-item-qtd { font-size: 16px; font-weight: 800; color: var(--primary); }

  .resumo-acoes { padding: 20px; display: flex; flex-direction: column; gap: 10px;
    border-top: 1px solid var(--border); flex-shrink: 0; }

  .feedback { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    text-align: center; min-height: 36px; }
  .feedback.ok   { background: rgba(90,214,90,.12);  color: var(--ok); }
  .feedback.erro { background: rgba(255,122,122,.12); color: var(--err); }
  .feedback.info { color: var(--text-muted); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="ecrãLoading" class="ecrã" style="display:flex">
  <div class="spinner"></div>
  <p style="color:var(--text-muted);font-size:14px">A verificar acesso…</p>
</div>

<!-- BLOQUEIO -->
<div id="ecrãBloqueio" class="ecrã">
  <div class="bloqueio-icon">🔒</div>
  <div id="bloqueioTitulo">Acesso negado</div>
  <div id="bloqueioMsg"></div>
</div>

<!-- CONTEXTO — definir origem/destino -->
<div id="ecrãContexto">
  <div class="ctx-header">
    <div class="logo">Maia Solutions</div>
    <h1>🚚 Nova Carga</h1>
    <p id="ctxFuncNome" style="color:var(--primary);font-weight:600"></p>
  </div>
  <div class="ctx-body">
    <div>
      <div class="campo-label">Origem — de onde saem os artigos</div>
      <div class="select-wrap">
        <select id="selOrigem"></select>
      </div>
    </div>
    <div class="seta-ctx">↓</div>
    <div>
      <div class="campo-label">Destino — para onde vão</div>
      <div class="select-wrap">
        <select id="selDestino"></select>
      </div>
    </div>
    <div id="ctxMsg" class="feedback info"></div>
    <button class="btn-primary" id="btnIniciarSessao">Iniciar Sessão</button>
  </div>
</div>

<!-- SESSÃO ACTIVA -->
<div id="ecrãSessao">

  <!-- Header fixo com rota -->
  <div class="sess-header">
    <div class="sess-rota" id="sessRota"></div>
    <button class="btn-terminar" id="btnTerminar">Terminar</button>
  </div>

  <!-- Leitor QR -->
  <div class="qr-area">
    <video id="qrVideo" playsinline autoplay muted></video>
    <canvas id="qrCanvas"></canvas>
    <div class="qr-overlay"><div class="qr-frame"></div></div>
    <div class="qr-status" id="qrStatus">A iniciar câmara…</div>
  </div>

  <!-- Input manual -->
  <div class="manual-area">
    <input id="codigoManual" placeholder="Ou digita o código do artigo" autocomplete="off" autocorrect="off" autocapitalize="characters">
    <button id="btnManual">OK</button>
  </div>

  <!-- Lista de itens adicionados -->
  <div class="lista-header">
    <span>Artigos na carga</span>
    <strong id="contadorItens">0 itens</strong>
  </div>
  <div class="lista-itens" id="listaItens">
    <div class="lista-vazia">Lê um QR ou digita o código<br>para adicionar artigos à carga</div>
  </div>

</div>

<!-- MODAL — artigo detectado -->
<div class="modal-overlay" id="modalArtigo">
  <div class="modal-sheet">
    <div class="modal-artigo-codigo" id="modalCodigo"></div>
    <div class="modal-artigo-nome"   id="modalNome"></div>
    <div class="modal-artigo-tipo"   id="modalTipo"></div>

    <div class="aviso-repetido" id="avisoRepetido" style="display:none">
      ⚠️ Este artigo já está na carga.<br>
      <span id="avisoRepetidoQtd" style="font-size:12px;opacity:.8"></span>
    </div>

    <!-- Quantidade (só para materiais/consumíveis) -->
    <div id="qtdArea">
      <div class="campo-label" style="margin-bottom:10px">Quantidade</div>
      <div class="qtd-wrap">
        <button class="btn-qtd" id="btnMenos">−</button>
        <input id="modalQtdInput" type="number" min="0.01" step="0.01" value="1">
        <button class="btn-qtd" id="btnMais">+</button>
      </div>
    </div>

    <div class="modal-acoes">
      <button class="btn-primary" id="btnConfirmarArtigo">✓ Confirmar</button>
      <div id="btnAdicionarQtd" style="display:none">
        <button class="btn-primary" id="btnAdicionarAQtd"
          style="background:rgba(244,185,66,.2);color:var(--primary);border:1px solid rgba(244,185,66,.4)">
          + Adicionar à quantidade existente
        </button>
      </div>
      <button class="btn-cancelar" id="btnCancelarModal">Cancelar</button>
    </div>
  </div>
</div>

<!-- RESUMO -->
<div id="ecrãResumo">
  <div class="resumo-header">
    <h2>✓ Carga concluída</h2>
    <div class="resumo-rota" id="resumoRota"></div>
    <div class="resumo-meta" id="resumoMeta"></div>
  </div>
  <div class="resumo-lista" id="resumoLista"></div>
  <div class="resumo-acoes">
    <div id="feedbackResumo" class="feedback info"></div>
    <button class="btn-primary" id="btnImprimirGuia">🖨️ Imprimir Guia de Transporte</button>
    <button class="btn-secondary" id="btnNovaSessao" style="text-align:center">Nova Sessão</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="config.js"></script>
<script src="carga.js"></script>
</body>
</html>
