<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maia Solutions — Plataforma</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ============================================================
   TOKENS
============================================================ */
:root {
  --bg:         #f5f2ed;
  --panel:      rgba(217,217,217,0.44);
  --sidebar-w:  280px;
  --header-h:   100px;
  --primary:    #c8a882;
  --primary-dk: #a8845c;
  --accent-grn: #8ae298;
  --text:       #1a1a1a;
  --text-muted: #666;
  --white:      #fff;
  --shadow:     0 4px 16px rgba(0,0,0,0.12);
  --radius:     10px;
  --font-title: 'Oswald', sans-serif;
  --font-body:  'Inter', sans-serif;
}

/* ============================================================
   RESET & BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ============================================================
   FUNDO COM TEXTURA (jornal financeiro como no Figma)
============================================================ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(0,0,0,.03) 24px, rgba(0,0,0,.03) 25px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0,0,0,.02) 60px, rgba(0,0,0,.02) 61px);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(200,168,130,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(180,150,110,.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   LAYOUT PRINCIPAL
============================================================ */
.app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
}

/* ============================================================
   HEADER
============================================================ */
.header {
  grid-column: 1 / -1;
  background: var(--panel);
  backdrop-filter: blur(8px);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 20px;
  position: relative;
  z-index: 10;
}

.logo {
  height: 80px;
  width: auto;
}

.header-title {
  flex: 1;
  text-align: center;
  font-family: var(--font-title);
  font-size: 24px;
  letter-spacing: 2.5px;
  font-weight: 400;
  text-transform: uppercase;
}

.header-user {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.header-user svg {
  width: 40px; height: 40px;
  opacity: .7;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn-sair {
  font-family: var(--font-title);
  font-size: 12px;
  letter-spacing: 1px;
  padding: 6px 16px;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,.2);
  background: rgba(0,0,0,.06);
  cursor: pointer;
  text-transform: uppercase;
}

.btn-admin {
  font-family: var(--font-title);
  font-size: 12px;
  letter-spacing: 1px;
  padding: 6px 16px;
  border-radius: 6px;
  border: none;
  background: var(--primary-dk);
  color: white;
  cursor: pointer;
  text-transform: uppercase;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}

/* ============================================================
   SIDEBAR
============================================================ */
.sidebar {
  background: var(--panel);
  backdrop-filter: blur(8px);
  box-shadow: var(--shadow);
  padding: 24px 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar-section {
  margin-top: 16px;
}

.sidebar-section:first-child { margin-top: 0; }

.sidebar-label {
  font-family: var(--font-title);
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0 8px;
  margin-bottom: 6px;
}

.nav-btn {
  display: block;
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius);
  border: none;
  background: rgba(217,217,217,0.6);
  font-family: var(--font-title);
  font-size: 13px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,.1);
  transition: background .15s, transform .1s;
  color: var(--text);
  margin-bottom: 6px;
}

.nav-btn:hover {
  background: rgba(200,168,130,.4);
  transform: translateX(2px);
}

.nav-btn.active {
  background: #e9d2b8;
  font-weight: 500;
  box-shadow: 0 3px 10px rgba(0,0,0,.15);
}

/* ============================================================
   CONTEÚDO PRINCIPAL
============================================================ */
.main {
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ============================================================
   PAINÉIS (cards semi-transparentes)
============================================================ */
.painel {
  background: rgba(217,217,217,0.44);
  backdrop-filter: blur(6px);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}

.painel-title {
  font-family: var(--font-title);
  font-size: 18px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  border-bottom: 1px solid rgba(0,0,0,.1);
  padding-bottom: 10px;
}

/* ============================================================
   SEÇÃO VISÃO GERAL
============================================================ */
.visao-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

.kpi-card {
  background: rgba(255,255,255,.5);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

.kpi-label {
  font-family: var(--font-title);
  font-size: 12px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.kpi-value {
  font-family: var(--font-title);
  font-size: 26px;
  letter-spacing: 1px;
  font-weight: 500;
}

.kpi-value.verde  { color: #2a8a2a; }
.kpi-value.vermelho { color: #c0392b; }
.kpi-value.neutro { color: var(--text); }

/* ============================================================
   DESPESAS PREVISTAS
============================================================ */
.despesas-lista {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.despesa-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: rgba(255,255,255,.4);
  border-radius: 8px;
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: .5px;
}

.despesa-valor { font-weight: 500; }
.despesa-data  { font-size: 12px; color: var(--text-muted); }
.despesa-obra  { font-size: 12px; color: var(--primary-dk); }

/* ============================================================
   CLIENTES EM ABERTO
============================================================ */
.clientes-lista {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cliente-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 8px;
  border-radius: 8px;
  transition: background .15s;
}

.cliente-item:hover { background: rgba(255,255,255,.3); }

.cliente-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-title);
  font-size: 14px;
  font-weight: 500;
  color: white;
  flex-shrink: 0;
}

.cliente-info { flex: 1; }

.cliente-nome {
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: .3px;
}

.cliente-sub {
  font-size: 11px;
  color: var(--text-muted);
}

.cliente-valor {
  font-family: var(--font-title);
  font-size: 13px;
  font-weight: 500;
  color: var(--primary-dk);
}

/* ============================================================
   FORMULÁRIOS (Despesas / Fluxo / Orçamentos)
============================================================ */
.form-section { display: none; }
.form-section.active { display: block; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.form-row.full { grid-template-columns: 1fr; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }

.form-input {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,.8);
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: .3px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  width: 100%;
  color: var(--text);
}

.form-input::placeholder { color: #aaa; }
.form-input:focus { outline: 2px solid var(--primary); }

.form-select {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,.8);
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: .3px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  width: 100%;
  color: var(--text);
  cursor: pointer;
}

.form-actions {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.btn-cancelar {
  padding: 10px 28px;
  border-radius: 8px;
  border: none;
  background: #9f9f9f;
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
}

.btn-adicionar {
  padding: 10px 28px;
  border-radius: 8px;
  border: none;
  background: var(--accent-grn);
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  font-weight: 500;
}

.form-msg {
  margin-top: 10px;
  font-size: 13px;
  font-family: var(--font-title);
  letter-spacing: .5px;
  min-height: 18px;
}

/* ============================================================
   HISTORIAL / TABELA
============================================================ */
.hist-title {
  font-family: var(--font-title);
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 0 10px;
}

.hist-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.hist-table th {
  font-family: var(--font-title);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid rgba(0,0,0,.1);
}

.hist-table td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(0,0,0,.05);
}

.hist-table tbody tr:hover { background: rgba(255,255,255,.3); }

.badge-entrada {
  background: rgba(42,138,42,.15);
  color: #2a8a2a;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}

.badge-saida {
  background: rgba(192,57,43,.1);
  color: #c0392b;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}

.badge-pago {
  background: rgba(42,138,42,.1);
  color: #2a8a2a;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
}

.badge-por-pagar {
  background: rgba(200,168,130,.2);
  color: var(--primary-dk);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
}

/* ============================================================
   COLABORADORES
============================================================ */
.colab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.colab-card {
  background: rgba(255,255,255,.5);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}

.colab-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--primary);
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-title);
  font-size: 20px;
  color: white;
}

.colab-nome {
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: .5px;
  text-transform: uppercase;
}

.colab-horas {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

.colab-valor {
  font-family: var(--font-title);
  font-size: 16px;
  font-weight: 500;
  color: var(--primary-dk);
  margin-top: 6px;
}

/* ============================================================
   GRÁFICO FLUXO
============================================================ */
.chart-wrap {
  background: rgba(255,255,255,.4);
  border-radius: var(--radius);
  padding: 16px;
  height: 220px;
}

/* ============================================================
   LOGIN OVERLAY
============================================================ */
.login-overlay {
  position: fixed;
  inset: 0;
  background: rgba(245,242,237,.97);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  background: rgba(217,217,217,.6);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,.15);
  padding: 40px 48px;
  width: 380px;
  text-align: center;
}

.login-logo {
  height: 90px;
  margin-bottom: 20px;
}

.login-title {
  font-family: var(--font-title);
  font-size: 20px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
  color: var(--text);
}

.login-input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,.8);
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: .5px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,.08);
}

.login-btn {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: var(--primary-dk);
  color: white;
  font-family: var(--font-title);
  font-size: 15px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 4px;
  transition: background .2s;
}

.login-btn:hover { background: #8a6a40; }

.login-msg {
  font-size: 13px;
  color: #c0392b;
  margin-top: 10px;
  min-height: 18px;
  font-family: var(--font-title);
}

/* ============================================================
   LOADING
============================================================ */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  opacity: .5;
  font-family: var(--font-title);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-size: 13px;
}

/* ============================================================
   RESPONSIVO BÁSICO
============================================================ */
@media (max-width: 900px) {
  .app {
    grid-template-columns: 200px 1fr;
  }
  .visao-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <img src="Logo.png" class="login-logo" alt="Maia Solutions">
    <div class="login-title">Acesso à Plataforma</div>
    <input class="login-input" id="loginEmail" type="email" placeholder="Email">
    <input class="login-input" id="loginPassword" type="password" placeholder="Password">
    <button class="login-btn" id="loginBtn">Entrar</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appWrap" style="display:none">

  <!-- HEADER -->
  <header class="header">
    <img src="Logo.png" class="logo" alt="Maia Solutions">
    <div class="header-title" id="headerTitle">Visão Geral</div>
    <div class="header-actions">
      <div class="header-user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span id="userName">Admin</span>
      </div>
      <a href="admin.html" class="btn-admin">Gestão</a>
      <button class="btn-sair" id="btnSair">Sair</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Visão Geral</div>
      <button class="nav-btn active" data-view="visao">Visão Geral</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Orçamentos</div>
      <button class="nav-btn" data-view="orcamentos">Nova Cotação Entregue</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Fluxo de Caixa</div>
      <button class="nav-btn" data-view="caixa">Consultar Caixa</button>
      <button class="nav-btn" data-view="adiantamento">Adiantamento de Cliente</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Despesas</div>
      <button class="nav-btn" data-view="despesa-obra">Despesa de Obra Paga</button>
      <button class="nav-btn" data-view="despesa-pagar">Despesa por Pagar</button>
      <button class="nav-btn" data-view="despesa-geral">Despesa Geral Paga</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Colaboradores</div>
      <button class="nav-btn" data-view="colaboradores">Gestão de Equipa</button>
    </div>

  </nav>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="loading">A carregar...</div>
  </main>

</div>

<script src="config.js"></script>
<script>
// ============================================================
// AUTH
// ============================================================
async function init() {
  const { data: { session } } = await SB.auth.getSession();
  if (session) {
    mostrarApp(session.user);
  }
}

document.getElementById("loginBtn").addEventListener("click", fazerLogin);
document.getElementById("loginPassword").addEventListener("keydown", e => {
  if (e.key === "Enter") fazerLogin();
});

async function fazerLogin() {
  const email    = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const msg      = document.getElementById("loginMsg");
  msg.textContent = "A autenticar...";

  const { data, error } = await SB.auth.signInWithPassword({ email, password });
  if (error) {
    msg.textContent = "Credenciais inválidas.";
    return;
  }
  mostrarApp(data.user);
}

function mostrarApp(user) {
  document.getElementById("loginOverlay").style.display = "none";
  document.getElementById("appWrap").style.display = "grid";
  const nome = user.email.split("@")[0].replace(/[._]/g, " ").toUpperCase();
  document.getElementById("userName").textContent = nome;
  navegarPara("visao");
}

document.getElementById("btnSair").addEventListener("click", async () => {
  await SB.auth.signOut();
  location.reload();
});

// ============================================================
// NAVEGAÇÃO
// ============================================================
const views = {
  "visao":        renderVisao,
  "orcamentos":   renderOrcamentos,
  "caixa":        renderCaixa,
  "adiantamento": renderAdiantamento,
  "despesa-obra": () => renderFormDespesa("obra"),
  "despesa-pagar":() => renderFormDespesa("pagar"),
  "despesa-geral":() => renderFormDespesa("geral"),
  "colaboradores":renderColaboradores,
};

const titulos = {
  "visao":        "Visão Geral",
  "orcamentos":   "Orçamentos",
  "caixa":        "Fluxo de Caixa",
  "adiantamento": "Fluxo de Caixa",
  "despesa-obra": "Despesas",
  "despesa-pagar":"Despesas",
  "despesa-geral":"Despesas",
  "colaboradores":"Colaboradores",
};

document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    navegarPara(btn.dataset.view);
  });
});

function navegarPara(view) {
  document.getElementById("headerTitle").textContent = titulos[view] || "";
  document.getElementById("mainContent").innerHTML = '<div class="loading">A carregar...</div>';
  if (views[view]) views[view]();
}

// ============================================================
// VISÃO GERAL
// ============================================================
async function renderVisao() {
  const [movRes, obrasRes, funcRes, registosRes] = await Promise.all([
    SB.from("movimentos_financeiros").select("tipo, valor_total, estado_pagamento, data_documento, obras(nome)").eq("ativo", true),
    SB.from("obras").select("id, nome"),
    SB.from("funcionarios").select("id, nome").eq("ativo", true),
    SB.from("vw_registos_ponto").select("funcionario, horas").gte("dia", new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split("T")[0]),
  ]);

  const movs = movRes.data || [];
  const hoje = new Date();
  const trintaDiasAtras = new Date(hoje - 30 * 86400000).toISOString().split("T")[0];

  const movsRecentes = movs.filter(m => m.data_documento >= trintaDiasAtras);
  const totalEntradas = movs.filter(m => m.tipo === "entrada").reduce((s,m) => s + Number(m.valor_total), 0);
  const totalSaidas   = movs.filter(m => m.tipo === "saida").reduce((s,m) => s + Number(m.valor_total), 0);
  const saldo         = totalEntradas - totalSaidas;

  const porPagar = movs.filter(m => m.estado_pagamento === "por_pagar" && m.tipo === "saida");

  // Horas mês por funcionário
  const horasPorFunc = {};
  (registosRes.data || []).forEach(r => {
    if (!r.funcionario || !r.horas) return;
    let h = 0;
    if (typeof r.horas === "string" && r.horas.includes(":")) {
      const [hh,mm] = r.horas.split(":").map(Number);
      h = hh + mm/60;
    } else h = Number(r.horas) || 0;
    horasPorFunc[r.funcionario] = (horasPorFunc[r.funcionario] || 0) + h;
  });

  const main = document.getElementById("mainContent");
  main.innerHTML = `

    <!-- KPIs -->
    <div class="painel">
      <div class="painel-title">Resumo Financeiro</div>
      <div class="visao-grid">
        <div class="kpi-card">
          <div class="kpi-label">Caixa (entradas)</div>
          <div class="kpi-value verde">${fmtEur(totalEntradas)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Total despesas</div>
          <div class="kpi-value vermelho">${fmtEur(totalSaidas)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Saldo</div>
          <div class="kpi-value ${saldo >= 0 ? "verde" : "vermelho"}">${fmtEur(saldo)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Obras ativas</div>
          <div class="kpi-value neutro">${(obrasRes.data || []).length}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Colaboradores ativos</div>
          <div class="kpi-value neutro">${(funcRes.data || []).length}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Movimentos (30 dias)</div>
          <div class="kpi-value neutro">${movsRecentes.length}</div>
        </div>
      </div>
    </div>

    <!-- Fila 2: Despesas previstas + Clientes em aberto -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

      <div class="painel">
        <div class="painel-title">Despesas Previstas</div>
        <div class="despesas-lista" id="despesasPrevistas">
          ${porPagar.length === 0
            ? '<div style="opacity:.5;font-size:13px;padding:8px 0">Sem despesas por pagar</div>'
            : porPagar.slice(0,6).map(m => `
              <div class="despesa-item">
                <div>
                  <div class="despesa-valor">${fmtEur(Number(m.valor_total))}</div>
                  <div class="despesa-obra">${m.obras?.nome || "—"}</div>
                </div>
                <div class="despesa-data">${m.data_documento || ""}</div>
              </div>`).join("")}
        </div>
      </div>

      <div class="painel">
        <div class="painel-title">Obras em Aberto</div>
        <div class="clientes-lista">
          ${(obrasRes.data || []).slice(0,6).map(o => `
            <div class="cliente-item">
              <div class="cliente-avatar">${o.nome.charAt(0).toUpperCase()}</div>
              <div class="cliente-info">
                <div class="cliente-nome">${o.nome}</div>
                <div class="cliente-sub">Em curso</div>
              </div>
            </div>`).join("")}
        </div>
      </div>

    </div>

    <!-- Gráfico movimentos -->
    <div class="painel">
      <div class="painel-title">Movimentos — últimos 30 dias</div>
      <div class="chart-wrap">
        <canvas id="chartVisao"></canvas>
      </div>
    </div>
  `;

  // Gráfico últimos 30 dias
  const labels = [];
  const entData = []; const saiData = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(hoje - i * 86400000);
    const ds = d.toISOString().split("T")[0];
    labels.push(d.toLocaleDateString("pt-PT", { day:"2-digit", month:"2-digit" }));
    entData.push(movsRecentes.filter(m => m.data_documento === ds && m.tipo === "entrada").reduce((s,m) => s + Number(m.valor_total), 0));
    saiData.push(movsRecentes.filter(m => m.data_documento === ds && m.tipo === "saida").reduce((s,m) => s + Number(m.valor_total), 0));
  }

  new Chart(document.getElementById("chartVisao"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label:"Entradas", data: entData, borderColor:"#2a8a2a", backgroundColor:"rgba(42,138,42,.08)", tension:.4, fill:true, pointRadius:2 },
        { label:"Saídas",   data: saiData, borderColor:"#c0392b", backgroundColor:"rgba(192,57,43,.06)", tension:.4, fill:true, pointRadius:2 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:"#555", font:{ size:12 } } } },
      scales: {
        x: { ticks:{ color:"#888", font:{size:10}, maxTicksLimit:10 }, grid:{ color:"rgba(0,0,0,.05)" } },
        y: { ticks:{ color:"#888", font:{size:11}, callback: v => v+"€" }, grid:{ color:"rgba(0,0,0,.05)" } }
      }
    }
  });
}

window.guardarOrcamento = async function() {
  const msg   = document.getElementById("orcMsg");
  const desc  = document.getElementById("orcDesc").value.trim();
  const ref   = document.getElementById("orcRef").value.trim();
  const obra  = document.getElementById("orcObra").value || null;
  const data  = document.getElementById("orcData").value;
  const valor = Number(document.getElementById("orcValor").value);

  if (!data || !valor) { msg.textContent = "Data e valor são obrigatórios."; return; }

  const { error } = await SB.from("movimentos_financeiros").insert({
    referencia: ref || null,
    data_documento: data,
    tipo: "entrada",
    obra_id: obra,
    valor_total: valor,
    valor_base: valor,
    iva: 0,
    estado_pagamento: "por_pagar",
    observacoes: desc || null,
    ativo: true
  });

  if (error) { msg.textContent = "Erro: " + error.message; return; }
  msg.style.color = "#2a8a2a";
  msg.textContent = "✓ Orçamento registado com sucesso.";
  renderOrcamentos();
};

// FORM DESPESA (obra / por pagar / geral)
// ============================================================
async function renderFormDespesa(tipo) {
  const { data: obras } = await SB.from("obras").select("id, nome").order("nome");
  const { data: cats  } = await SB.from("categorias_financeiras").select("id, nome").order("nome");
  const { data: forns } = await SB.from("fornecedores").select("id, nome").order("nome");
  const { data: hist  } = await SB.from("movimentos_financeiros")
    .select("referencia, data_documento, valor_total, obras(nome), estado_pagamento, fornecedores(nome)")
    .eq("tipo","saida").order("data_documento",{ascending:false}).limit(15);

  const titulos = { obra:"Nova Despesa de Obra Paga", pagar:"Nova Despesa por Pagar", geral:"Nova Despesa Geral Paga" };
  const estadoDefault = tipo === "pagar" ? "por_pagar" : "pago";

  document.getElementById("mainContent").innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

      <div class="painel">
        <div class="painel-title">${titulos[tipo]}</div>
        <div class="form-row full">
          <input class="form-input" id="dDesc" placeholder="Descrição">
        </div>
        <div class="form-row">
          <input class="form-input" id="dRef" placeholder="Doc. Ref.">
          ${tipo === "obra"
            ? `<select class="form-select" id="dObra"><option value="">Obra</option>${(obras||[]).map(o=>`<option value="${o.id}">${o.nome}</option>`).join("")}</select>`
            : `<select class="form-select" id="dCat"><option value="">Categoria</option>${(cats||[]).map(c=>`<option value="${c.id}">${c.nome}</option>`).join("")}</select>`
          }
        </div>
        <div class="form-row">
          <input class="form-input" id="dData" type="date" value="${hoje()}">
          <input class="form-input" id="dValor" type="number" step="0.01" placeholder="Valor c/ IVA (€)">
        </div>
        <div class="form-row">
          <input class="form-input" id="dNif" placeholder="NIF Fornecedor (opcional)">
          <input class="form-input" id="dForn" placeholder="Nome Fornecedor">
        </div>
        <div class="form-actions">
          <button class="btn-cancelar" onclick="navegarPara('visao')">Cancelar</button>
          <button class="btn-adicionar" onclick="guardarDespesa('${tipo}','${estadoDefault}')">Adicionar</button>
        </div>
        <div class="form-msg" id="dMsg"></div>
      </div>

      <div class="painel">
        <div class="painel-title">Histórico de Despesas</div>
        <table class="hist-table">
          <thead><tr><th>Data</th><th>Ref.</th><th>Fornecedor</th><th style="text-align:right">Valor</th><th>Estado</th></tr></thead>
          <tbody>
            ${(hist||[]).map(m=>`<tr>
              <td>${m.data_documento||""}</td>
              <td style="font-size:11px;opacity:.7">${m.referencia||"—"}</td>
              <td>${m.fornecedores?.nome||m.obras?.nome||"—"}</td>
              <td style="text-align:right;color:#c0392b">-${fmtEur(Number(m.valor_total))}</td>
              <td><span class="${m.estado_pagamento==="pago"?"badge-pago":"badge-por-pagar"}">${m.estado_pagamento==="pago"?"Pago":"Por pagar"}</span></td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>

    </div>
  `;
}

window.guardarDespesa = async function(tipo, estado) {
  const msg   = document.getElementById("dMsg");
  const desc  = document.getElementById("dDesc").value.trim();
  const ref   = document.getElementById("dRef").value.trim();
  const data  = document.getElementById("dData").value;
  const valor = Number(document.getElementById("dValor").value);
  const nif   = document.getElementById("dNif").value.trim();
  const forn  = document.getElementById("dForn").value.trim();
  const obra  = document.getElementById("dObra")?.value || null;
  const cat   = document.getElementById("dCat")?.value  || null;

  if (!data || !valor) { msg.textContent = "Data e valor são obrigatórios."; return; }

  let fornecedor_id = null;
  if (nif || forn) {
    const query = nif
      ? await SB.from("fornecedores").select("id").eq("nif", nif).maybeSingle()
      : { data: null };

    if (query.data) {
      fornecedor_id = query.data.id;
    } else {
      const { data: novo } = await SB.from("fornecedores")
        .insert({ nif: nif||null, nome: forn||nif }).select("id").single();
      fornecedor_id = novo?.id || null;
    }
  }

  const { error } = await SB.from("movimentos_financeiros").insert({
    referencia: ref||null, data_documento: data, tipo: "saida",
    fornecedor_id, obra_id: obra, categoria_id: cat,
    valor_total: valor, valor_base: valor/(1+0.23), iva: 23,
    estado_pagamento: estado, observacoes: desc||null, ativo: true
  });

  if (error) { msg.textContent = "Erro: " + error.message; return; }
  msg.style.color = "#2a8a2a";
  msg.textContent = "✓ Despesa registada com sucesso.";
  setTimeout(() => renderFormDespesa(tipo), 1200);
};

// ============================================================
// COLABORADORES
// ============================================================
async function renderColaboradores() {
  const anoAtual = new Date().getFullYear();
  const mesAtual = new Date().getMonth() + 1;
  const mesStr   = String(mesAtual).padStart(2,"0");
  const inicio   = `${anoAtual}-${mesStr}-01`;
  const fim      = `${anoAtual}-${mesStr}-${new Date(anoAtual,mesAtual,0).getDate()}`;

  const [funcRes, kpiRes, registosRes] = await Promise.all([
    SB.from("funcionarios").select("id, nome, codigo, valor_dia, ativo").order("nome"),
    SB.from("vw_kpis_financeiros_mes").select("*").single(),
    SB.from("vw_registos_ponto").select("funcionario, horas, dia").gte("dia",inicio).lte("dia",fim),
  ]);

  const funcs    = (funcRes.data||[]).filter(f => f.ativo !== false);
  const kpi      = kpiRes.data || {};
  const registos = registosRes.data || [];

  // Horas por funcionário no mês
  const horasPorFunc = {};
  registos.forEach(r => {
    if (!r.funcionario || !r.horas) return;
    let h = 0;
    if (typeof r.horas === "string" && r.horas.includes(":")) {
      const [hh,mm] = r.horas.split(":").map(Number); h = hh + mm/60;
    } else h = Number(r.horas)||0;
    horasPorFunc[r.funcionario] = (horasPorFunc[r.funcionario]||0) + h;
  });

  document.getElementById("mainContent").innerHTML = `
    <div class="painel">
      <div class="painel-title">Resumo do Mês</div>
      <div class="visao-grid">
        <div class="kpi-card"><div class="kpi-label">Total horas</div><div class="kpi-value neutro">${kpi.total_horas_mes||"–"}</div></div>
        <div class="kpi-card"><div class="kpi-label">Dias trabalhados</div><div class="kpi-value neutro">${kpi.total_dias_trabalhados||"–"}</div></div>
        <div class="kpi-card"><div class="kpi-label">Total a pagar</div><div class="kpi-value vermelho">${kpi.total_a_pagar?fmtEur(Number(kpi.total_a_pagar)):"–"}</div></div>
      </div>
    </div>

    <div class="painel">
      <div class="painel-title">Equipa — ${new Date().toLocaleString("pt-PT",{month:"long",year:"numeric"})}</div>
      <div class="colab-grid">
        ${funcs.map(f => {
          const h = horasPorFunc[f.nome] || 0;
          const dias = (registos.filter(r=>r.funcionario===f.nome)).length;
          const valor = f.valor_dia ? (dias * f.valor_dia) : null;
          return `
            <div class="colab-card">
              <div class="colab-avatar">${f.nome.charAt(0).toUpperCase()}</div>
              <div class="colab-nome">${f.nome}</div>
              <div class="colab-horas">${h.toFixed(1)}h · ${dias} dias</div>
              ${valor !== null ? `<div class="colab-valor">${fmtEur(valor)}</div>` : ""}
            </div>`;
        }).join("")}
      </div>
    </div>
  `;
}

// ============================================================
// UTILS
// ============================================================
function fmtEur(v) {
  return new Intl.NumberFormat("pt-PT",{minimumFractionDigits:2,maximumFractionDigits:2}).format(v) + " €";
}

function hoje() {
  return new Date().toISOString().split("T")[0];
}

// ============================================================
init();
</script>
