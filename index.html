<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maia Solutions</title>
<script>
  // Se vier com ?obra=..., redirecionar para app.html
  const params = window.location.search;
  if (params.includes('obra=')) {
    window.location.replace('app.html' + params);
  } else {
    window.location.replace('dashboard.html');
  }
</script>
</head>
<body></body>
</html>
