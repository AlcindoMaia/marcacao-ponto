<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gerar QR — Maia Solutions</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2&quot;&gt;&lt;/script&gt;<br/>&lt;script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js&quot;&gt;&lt;/script&gt;<br/>&lt;script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js&quot;&gt;&lt;/script&gt;<br/><br/>&lt;/head&gt;<br/><br/>&lt;body class="dark">

<div class="qr-page">

<h2>Criar Nova Obra + QR Code</h2>

<form id="formObra">

<label>Nome da Obra</label>
<input id="nomeObra" required>

<label>Morada</label>
<input id="morada">

<label>Raio (metros)</label>
<input id="raio" type="number" value="120">

<label>Latitude</label>
<input id="latitude" readonly>

<label>Longitude</label>
<input id="longitude" readonly>

<div style="margin-top:15px">
<button type="button" id="btnGPS" class="btn-secondary">Obter Localização</button>
<button type="submit" id="btnGerar" class="btn-primary">Criar Obra</button>
<button type="button" id="btnPDF" class="btn-secondary">Criar PDF</button>
</div>

</form>

<div id="qrBox" style="margin-top:30px; display:none;">
<h3>QR Code</h3>
<canvas id="qrCanvas"></canvas>
</div>

</div>

<script src="qr.js?v=2026-01"></script>

</body>
</html>
